# =============================================================================
# BookMyShow Development Environment Configuration
# =============================================================================
# Active this profile during development: --spring.profiles.active=dev
# =============================================================================

## Development Spring Security (HTTPS disabled for easier testing)
server.ssl.enabled=false

## Logging - Development (verbose for debugging)
logging.level.root=DEBUG
logging.level.com.bookmyshow=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

## Security - Development
security.enable-debug=true
security.jwt.secret=dev-secret-key-change-in-production

## CORS - Development (allow localhost)
cors.allowed-origins=http://localhost:4200,http://localhost:4201,http://localhost:3000

## Database - Development 
spring.datasource.url=jdbc:mysql://localhost:3306/bookmyshow?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update

## DevTools - Enable automatic restart
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java

## Actuator - Full exposure in development
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

## Error Handling - Full details in development
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true

## H2 Console (for testing if needed)
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
