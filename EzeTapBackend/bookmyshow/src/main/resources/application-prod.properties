# =============================================================================
# BookMyShow Production Environment Configuration
# =============================================================================
# Active this profile in production: --spring.profiles.active=prod
# =============================================================================

## Production Spring Security
server.ssl.enabled=true
server.ssl.key-store=${SSL_KEYSTORE_PATH}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat

## Logging - Production (less verbose)
logging.level.root=WARN
logging.level.com.bookmyshow=INFO
logging.level.org.springframework.security=INFO

## Security - Production
security.jwt.secret=${JWT_SECRET}
security.enable-debug=false

## CORS - Production (strict)
cors.allowed-origins=https://bookmyshow.com,https://www.bookmyshow.com

## Database - Use environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

## Actuator - Restrict in production
management.endpoints.web.exposure.include=health,metrics

## Error Handling
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false

## Performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

## Connection Pool - Production
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
