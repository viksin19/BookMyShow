# =============================================================================
# BookMyShow Application Configuration
# =============================================================================
# This file contains common configuration for all environments.
# Use environment-specific files for sensitive data (dev, prod profiles)
# =============================================================================

## Application
spring.application.name=bookmyshow-api
server.port=8000
server.servlet.context-path=/api

## Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/bookmyshow?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

## JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false

## Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

## Logging Configuration
logging.level.root=INFO
logging.level.com.bookmyshow=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} [%thread] %-5level %logger{36} - %msg%n

## Security Configuration
security.jwt.secret=${JWT_SECRET:change-me-in-production-with-strong-secret-key}
security.jwt.expiration=900000
security.jwt.refresh.expiration=604800000

## CORS Configuration (Override in prod profile)
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

## Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

## Actuator Configuration
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=when-authorized
management.metrics.export.simple.enabled=true

## Server Configuration
server.compression.enabled=true
server.compression.min-response-size=1024
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false

## Application Info
spring.application.version=1.0.0

